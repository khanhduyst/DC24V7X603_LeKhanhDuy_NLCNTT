<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM AQUA - Dashboard</title>

    <!-- Bootstrap 5 CSS & Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/test.css">
</head>

<body>

    <!-- Container để Autoload Sidebar -->
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold text-primary mb-0">QUẢN LÝ NHÂN VIÊN</h4>
                <a href="./add-employee.html" class="btn btn-primary shadow-sm">
                    <i class="bi bi-person-plus-fill me-2"></i>Thêm mới
                </a>
            </div>

            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12 col-md-8">
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0">
                                    <i class="bi bi-search text-muted"></i>
                                </span>
                                <input type="text" id="search-emp" class="form-control border-start-0 ps-0"
                                    placeholder="Tìm tên, mã hoặc số điện thoại..." onkeyup="filterEmployees()">
                            </div>
                        </div>
                        <div class="col-12 col-md-4">
                            <select id="filter-role" class="form-select" onchange="filterEmployees()">
                                <option value="all">Tất cả chức vụ</option>
                                <option value="Kỹ thuật viên">Kỹ thuật viên</option>
                                <option value="Bán hàng">Bán hàng</option>
                                <option value="Quản lý">Quản lý</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-none d-md-block card border-0 shadow-sm">

                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Mã NV</th>
                                <th>Họ tên</th>
                                <th>Số điện thoại</th>
                                <th>Chức vụ</th>
                                <th class="text-end pe-4">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="employee-table-body">
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="employee-card-list" class="d-md-none">
            </div>
        </div>

    </main>

    <div class="modal fade" id="modalDetail" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-bottom bg-light">
                    <h5 class="modal-title fw-bold text-primary" id="modal-emp-name">Chi tiết nhân viên</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <ul class="nav nav-tabs border-0 flex-nowrap" id="empTab" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="info-tab" data-bs-toggle="tab"
                                data-bs-target="#info-pane" type="button">
                                <i class="bi bi-person-badge"></i>Thông tin
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="work-tab" data-bs-toggle="tab" data-bs-target="#work-pane"
                                type="button">
                                <i class="bi bi-calendar-event"></i>Công việc
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="kpi-tab" data-bs-toggle="tab" data-bs-target="#kpi-pane"
                                type="button">
                                <i class="bi bi-bar-chart"></i>KPI
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content p-4" id="empTabContent">

                        <div class="tab-pane fade show active" id="info-pane" role="tabpanel" tabindex="0">
                            <div id="tab-info-content">
                            </div>
                        </div>

                        <div class="tab-pane fade" id="work-pane" role="tabpanel" tabindex="0">
                            <div class="p-3 text-center text-muted border rounded">
                                <i class="bi bi-calendar3 fs-2"></i>
                                <p class="mt-2 mb-0">Chức năng lịch làm việc đang được phát triển</p>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="kpi-pane" role="tabpanel" tabindex="0">
                            <div class="p-3 text-center text-muted border rounded">
                                <i class="bi bi-bar-chart-line fs-2"></i>
                                <p class="mt-2 mb-0">Dữ liệu doanh số đang được cập nhật</p>
                            </div>
                        </div>

                    </div>
                </div>
                <div class="modal-footer border-top bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" onclick="editEmployee()">
                        <i class="bi bi-pencil-square me-2"></i>Chỉnh sửa
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade shadow" id="modalReportDetail" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header bg-light">
                    <h6 class="modal-title fw-bold" id="report-title">Báo cáo thị trường</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-2 mb-3">
                        <div class="col-7">
                            <img id="report-img"
                                src="https://hashtagcamtay.com/wp-content/uploads/2023/07/khung-check-in-su-kien-4.jpg"
                                class="img-fluid rounded border w-100" style="height: 150px; object-fit: cover;">
                            <div class="x-small text-muted mt-1 text-center">Ảnh check-in</div>
                        </div>
                        <div class="col-5">
                            <div class="position-relative border rounded overflow-hidden" style="height: 150px;">
                                <img src="https://www.google.com/maps/vt/pb=!1m4!1m3!1i13!2i6330!3i3725!2m3!1e0!2sm!3i606233261!3m8!2svi!3sUS!5e1105!12m4!1e68!2m2!1sset!2sRoadmap!4e0!5m1!1e0!23i1338780!23i1339140"
                                    class="w-100 h-100" style="object-fit: cover; filter: grayscale(0.5);">
                                <i
                                    class="bi bi-geo-alt-fill text-danger position-absolute top-50 start-50 translate-middle fs-4"></i>
                            </div>
                            <div class="x-small text-muted mt-1 text-center">Vị trí GPS</div>
                        </div>
                    </div>
                    <div class="p-3 bg-light rounded shadow-sm">
                        <label class="x-small fw-bold text-muted">NỘI DUNG TƯ VẤN</label>
                        <p class="small mb-0 mt-1" id="report-note">Đang tải nội dung...</p>
                    </div>
                </div>
                <div class="modal-footer border-0 pb-4">
                    <button type="button" class="btn btn-primary w-100 py-2 fw-bold" data-bs-dismiss="modal">ĐÃ XÁC
                        MINH</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/main.js"></script>
    <script src="assets/js/pages/employees.js"></script>
</body>

</html>
