<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM AQUA - Dashboard</title>

    <!-- Bootstrap 5 CSS & Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="https://crm.biglead.live/ic_biglead-yellow.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/test.css">
</head>

<body>

    <!-- Container để Autoload Sidebar -->
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <div class="container-fluid py-3">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h5 class="fw-bold mb-0 text-primary">QUẢN LÝ KHÁCH HÀNG</h5>
                <button class="btn btn-primary btn-sm px-3 shadow-sm" data-bs-toggle="modal"
                    data-bs-target="#addCustomerModal" onclick="resetModal()">
                    <i class="bi bi-plus-lg me-1"></i> Thêm mới
                </button>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-12">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="searchInput" class="form-control border-0 py-2"
                            placeholder="Tìm tên đại lý, địa chỉ...">
                    </div>
                </div>
            </div>

            <div class="filter-wrapper mb-3">
                <div class="filter-scroll-container">
                    <button class="filter-chip active" data-status="all">Tất cả</button>
                    <button class="filter-chip" data-status="success">Nợ thấp</button>
                    <button class="filter-chip" data-status="danger">Nợ quá hạn</button>
                    <button class="filter-chip" data-status="warning">Tiềm năng</button>
                    <button class="filter-chip" data-status="new">Khách mới</button>
                </div>
            </div>

            <div class="customer-list">
                <div class="card border-0 shadow-sm rounded-4 mb-3 customer-item" data-status="success">
                    <div class="card-body p-3">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0" onclick="goToDetail(1)">
                                <div
                                    class="avatar-customer bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center fw-bold">
                                    BT</div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <div class="d-flex justify-content-between align-items-start">
                                    <h6 class="fw-bold mb-0 text-dark" onclick="goToDetail(1)">Đại lý Bảy Tôm</h6>
                                    <div class="dropdown">
                                        <button class="btn btn-link text-muted p-0 border-0" data-bs-toggle="dropdown">
                                            <i class="bi bi-three-dots-vertical"></i>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm small">
                                            <li><a class="dropdown-item" onclick="editCustomer(this)" href="#"><i class="bi bi-pencil me-2"></i>
                                                    Chỉnh sửa</a></li>
                                            <li><a class="dropdown-item text-danger" href="#"
                                                    onclick="deleteCustomer(this)"><i class="bi bi-trash me-2"></i> Xóa
                                                    khách</a></li>
                                        </ul>
                                    </div>
                                </div>
                                <p class="text-muted small mb-1" onclick="goToDetail(1)"><i
                                        class="bi bi-geo-alt me-1"></i> Ấp 2, Trần Đề, Sóc Trăng</p>
                                <div class="d-flex justify-content-between align-items-center mt-2">
                                    <span class="badge bg-success-subtle text-success" style="font-size: 10px;">Đang nợ
                                        thấp</span>
                                    <a href="tel:0901234567" class="btn btn-primary btn-sm rounded-pill px-3 py-1"
                                        style="font-size: 11px;">
                                        <i class="bi bi-telephone-fill me-1"></i> Gọi ngay
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 mb-3 customer-item" data-status="danger">
                    <div class="card-body p-3">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0" onclick="goToDetail(2)">
                                <div
                                    class="avatar-customer bg-warning-subtle text-warning rounded-circle d-flex align-items-center justify-content-center fw-bold">
                                    HL</div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <div class="d-flex justify-content-between align-items-start">
                                    <h6 class="fw-bold mb-0 text-dark" onclick="goToDetail(2)">Trại giống Hai Lúa</h6>
                                    <div class="dropdown">
                                        <button class="btn btn-link text-muted p-0 border-0" data-bs-toggle="dropdown">
                                            <i class="bi bi-three-dots-vertical"></i>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm small">
                                            <li><a class="dropdown-item" href="#" onclick="editCustomer(this)"><i class="bi bi-pencil me-2"></i>
                                                    Chỉnh sửa</a></li>
                                            <li><a class="dropdown-item text-danger" href="#"
                                                    onclick="deleteCustomer(this)"><i class="bi bi-trash me-2"></i> Xóa
                                                    khách</a></li>
                                        </ul>
                                    </div>
                                </div>
                                <p class="text-muted small mb-1" onclick="goToDetail(2)"><i
                                        class="bi bi-geo-alt me-1"></i> Mỹ Xuyên, Sóc Trăng</p>
                                <div class="d-flex justify-content-between align-items-center mt-2">
                                    <span class="badge bg-danger-subtle text-danger" style="font-size: 10px;">Nợ quá
                                        hạn</span>
                                    <a href="tel:0988777666"  class="btn btn-primary btn-sm rounded-pill px-3 py-1"
                                        style="font-size: 11px;">
                                        <i class="bi bi-telephone-fill me-1"></i> Gọi ngay
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>


        </div>

    </main>

    <div class="modal fade" id="addCustomerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold mb-0 text-primary">THÊM KHÁCH HÀNG MỚI</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addCustomerForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="small fw-bold text-muted mb-1">Tên Đại lý / Khách hàng <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control border-0 bg-light py-2" id="custName"
                                        placeholder="Nhập tên khách hàng..." required>
                                </div>
                                <div class="mb-3">
                                    <label class="small fw-bold text-muted mb-1">Số điện thoại</label>
                                    <input type="tel" class="form-control border-0 bg-light py-2" id="custPhone"
                                        placeholder="090...">
                                </div>
                                <div class="mb-3">
                                    <label class="small fw-bold text-muted mb-1">Loại khách hàng</label>
                                    <select class="form-select border-0 bg-light py-2" id="custStatus">
                                        <option value="new" selected>Khách mới (Mặc định)</option>
                                        <option value="success">Nợ thấp</option>
                                        <option value="danger">Nợ quá hạn</option>
                                        <option value="warning">Tiềm năng</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="small fw-bold text-muted mb-1">Số ao đang nuôi</label>
                                    <input type="number" class="form-control border-0 bg-light py-2" id="custPonds"
                                        placeholder="Ví dụ: 3" min="0">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="small fw-bold text-muted mb-1">Nhân viên phụ trách (Nhập
                                        mã/SĐT)</label>
                                    <div class="input-group">
                                        <input type="text" class="form-control border-0 bg-light py-2" id="staffSearch"
                                            placeholder="NV001 hoặc 09..." oninput="findStaff()">
                                        <span class="input-group-text border-0 bg-light"><i
                                                class="bi bi-search"></i></span>
                                    </div>
                                    <div id="staffResult" class="small mt-1 fw-bold text-primary"></div>
                                </div>
                                <div class="mb-3">
                                    <label class="small fw-bold text-muted mb-1">Địa chỉ chi tiết <span
                                            class="text-danger">*</span></label>
                                    <textarea class="form-control border-0 bg-light" id="custAddress" rows="2"
                                        placeholder="Ấp, Xã, Huyện, Tỉnh..."></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="small fw-bold text-muted mb-1">Ghi chú</label>
                                    <textarea class="form-control border-0 bg-light" id="custNote" rows="2"
                                        placeholder="Đặc điểm ao, loại thuốc hay dùng..."></textarea>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4 shadow" onclick="saveCustomer()">Lưu
                        dữ liệu khách hàng</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Dưới cùng file index.html -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/main.js"></script>
    <script src="assets/js/pages/customer-list.js"></script>
</body>

</html>
