<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM AQUA - Bán Hàng (POS)</title>

    <!-- Bootstrap 5 CSS & Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Link CSS test của Duy để chỉnh khoảng cách -->
    <link rel="stylesheet" href="assets/css/test.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Container để Autoload Sidebar -->
    <div id="sidebar-container"></div>

    <main class="main-content">
        <!-- Container để Autoload Header -->
        <div id="header-container"></div>

        <div class="container-fluid p-4">
            <div class="row g-4">
                <!-- CỘT TRÁI -->
                <div class="col-lg-7">
                    <!-- Khối 1: THÔNG TIN SẢN PHẨM -->
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white py-3">
                            <h6 class="fw-bold mb-0 text-uppercase small">Thông tin sản phẩm</h6>
                        </div>
                        <div class="card-body">
                            <div class="input-group mb-3">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                                <input type="text" id="search-product"
                                    class="form-control bg-light border-start-0 shadow-none"
                                    placeholder="Tìm theo mã hoặc tên sản phẩm...">
                            </div>

                            <!-- Kết quả tìm kiếm (Dropdown ẩn hiện) -->
                            <div id="search-results" class="list-group shadow-sm mb-3 d-none"></div>

                            <!-- Danh sách sản phẩm đã chọn -->
                            <!-- Danh sách sản phẩm đã chọn -->
                            <div id="cart-list" class="mt-2" style="min-height: 200px;">
                                <!-- QUAN TRỌNG: Phải có đúng ID 'cart-empty' ở đây -->
                                <div class="text-center py-5 text-muted" id="cart-empty">
                                    <i class="bi bi-cart-x fs-1 d-block mb-2"></i>
                                    <span class="small">Chưa có thông tin sản phẩm</span>
                                </div>
                            </div>
                            <a href="#" class="text-decoration-none small mt-3 d-inline-block text-primary">+ Thêm mới
                                sản
                                phẩm</a>
                        </div>
                    </div>

                    <!-- Khối 2: THÔNG TIN THANH TOÁN -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white py-3">
                            <h6 class="fw-bold mb-0 text-uppercase small">Thông tin thanh toán</h6>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-7">
                                    <label class="small fw-bold mb-2">Ghi chú đơn hàng</label>
                                    <textarea id="order-note" class="form-control shadow-none" rows="4"
                                        placeholder="Nhập ghi chú khách dặn..."></textarea>
                                </div>
                                <div class="col-md-5">
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="text-muted small">Tổng tiền hàng:</span>
                                        <b id="subtotal">0đ</b>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span class="text-muted small">Phụ thu:</span>
                                        <input type="number" id="extra-fee"
                                            class="form-control form-control-sm w-50 text-end border-0 border-bottom rounded-0 shadow-none"
                                            value="0">
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mb-3 text-success">
                                        <span class="small fw-bold">Giảm giá thêm:</span>
                                        <input type="number" id="order-discount"
                                            class="form-control form-control-sm w-50 text-end border-0 border-bottom rounded-0 shadow-none text-success fw-bold"
                                            value="0">
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center border-top pt-2">
                                        <span class="fw-bold">THỰC THU:</span>
                                        <span id="total-final" class="fs-4 fw-bold text-danger">0đ</span>
                                    </div>
                                    <button class="btn btn-primary w-100 mt-3 py-2 fw-bold" onclick="createOrder()">
                                        <i class="bi bi-check2-circle me-1"></i> TẠO ĐƠN HÀNG
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- CỘT PHẢI -->
                <div class="col-lg-5">
                    <!-- Khối 3: THÔNG TIN KHÁCH HÀNG -->
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white py-3 text-uppercase small fw-bold">Thông tin khách hàng</div>
                        <div class="card-body">
                            <div class="input-group mb-3">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
                                <input type="text" id="search-customer"
                                    class="form-control bg-light border-start-0 shadow-none"
                                    placeholder="Tìm tên hoặc số điện thoại...">
                            </div>
                            <div id="customer-info" class="text-center py-4 bg-light rounded border border-dashed">
                                <i class="bi bi-person-plus fs-2 text-muted"></i>
                                <p class="small text-muted mb-0 mt-2">Chưa có thông tin khách hàng</p>
                            </div>
                        </div>
                    </div>

                    <!-- Khối 4: THÔNG TIN BỔ SUNG -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white py-3 text-uppercase small fw-bold">Thông tin bổ sung</div>
                        <div class="card-body">
                            <div class="mb-4">
                                <label class="small fw-bold text-muted mb-2">Người xử lý</label>
                                <select id="staff-select" class="form-select shadow-none bg-light border-0">
                                    <option value="1">Nguyễn Văn A (Nhân viên)</option>
                                    <option value="2">Trần Thị B (Thị trường)</option>
                                </select>
                            </div>
                            <div class="mb-2">
                                <label class="small fw-bold text-muted mb-2">Hình thức thanh toán</label>
                                <div class="row g-2" id="payment-methods">
                                    <div class="col-4">
                                        <button class="btn btn-primary w-100 py-2 small fw-bold" data-method="cash">Tiền
                                            mặt</button>
                                    </div>
                                    <div class="col-4">
                                        <button class="btn btn-outline-primary w-100 py-2 small fw-bold"
                                            data-method="vietqr">VietQR</button>
                                    </div>
                                    <div class="col-4">
                                        <button class="btn btn-outline-primary w-100 py-2 small fw-bold"
                                            data-method="vnpay">VNPay</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Modal Thay đổi giá -->
    <div class="modal fade" id="priceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-body p-4 text-center">
                    <h4 class="fw-bold mb-2">Thay đổi giá</h4>
                    <p class="text-muted small mb-4">Giá mới cho: <span id="modal-product-name"
                            class="fw-bold text-dark"></span></p>
                    <input type="number" id="new-price-input"
                        class="form-control form-control-lg text-center mb-4 shadow-none">
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-primary w-100 py-2" onclick="confirmNewPrice()">Cập
                            nhật</button>
                        <button type="button" class="btn btn-secondary w-100 py-2" data-bs-dismiss="modal">Hủy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts chuẩn theo khung của Duy -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/main.js"></script>
    <!-- File xử lý logic bán hàng riêng -->
    <script src="assets/js/pages/pos-sales.js"></script>
</body>

</html>
