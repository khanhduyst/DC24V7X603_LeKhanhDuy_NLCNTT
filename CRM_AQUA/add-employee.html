<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM AQUA - Dashboard</title>

    <!-- Bootstrap 5 CSS & Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/test.css">
</head>

<body>

    <!-- Container để Autoload Sidebar -->
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <div class="container-fluid py-4">
            <div class="d-flex align-items-center mb-4">
                <h4 class="fw-bold mb-0 text-dark">Thêm Hồ Sơ Nhân Viên</h4>
            </div>

            <div class="card border-0 shadow-sm custom-card rounded-3">
                <div class="tab-scroll-wrapper border-bottom">
                    <ul class="nav nav-tabs border-0 flex-nowrap aqua-tabs" id="empTab" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="info-tab" data-bs-toggle="tab"
                                data-bs-target="#info-pane" type="button" role="tab">
                                <i class="bi bi-person-badge me-1"></i>Thông tin
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="work-tab" data-bs-toggle="tab" data-bs-target="#work-pane"
                                type="button" role="tab">
                                <i class="bi bi-calendar-event me-1"></i>Công việc
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="kpi-tab" data-bs-toggle="tab" data-bs-target="#kpi-pane"
                                type="button" role="tab">
                                <i class="bi bi-bar-chart me-1"></i>KPI
                            </button>
                        </li>
                    </ul>
                </div>

                <div class="card-body p-2 p-md-4">
                    <form id="formAddEmployee">
                        <div class="tab-content" id="empTabContent">

                            <div class="tab-pane fade show active" id="info-pane" role="tabpanel">
                                <div class="row g-3">
                                    <div class="col-md-3 text-center border-end-md">
                                        <div class="avatar-upload position-relative d-inline-block">
                                            <div class="avatar-preview mb-3 mx-auto" id="imagePreview"
                                                style="width: 140px; height: 140px; border: 2px dashed #dee2e6; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #f8fafc;">
                                                <i class="bi bi-camera fs-1 text-secondary" id="cameraIcon"></i>
                                                <img src="" id="imgOut"
                                                    style="width: 100%; height: 100%; object-fit: cover; display: none;">
                                            </div>
                                            <div class="mb-3">
                                                <input type="file" class="form-control form-control-sm mx-auto"
                                                    style="max-width: 180px;" id="employeeAvatar" accept="image/*"
                                                    onchange="previewFile()">
                                            </div>
                                        </div>
                                        <div class="custom-field text-start px-2 mt-2">
                                            <label>Trạng thái</label>
                                            <select class="form-select">
                                                <option value="active">Đang đi làm</option>
                                                <option value="leave">Nghỉ phép</option>
                                                <option value="off">Nghỉ việc</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="col-md-9">
                                        <div class="row g-3">
                                            <div class="col-md-6 custom-field">
                                                <label>Mã nhân viên</label>
                                                <input type="text" class="form-control" placeholder="VD: NV001">
                                            </div>
                                            <div class="col-md-6 custom-field">
                                                <label>Giới tính</label>
                                                <select class="form-select">
                                                    <option>Nam</option>
                                                    <option>Nữ</option>
                                                </select>
                                            </div>
                                            <div class="col-md-6 custom-field">
                                                <label>Email đăng nhập (Gmail)</label>
                                                <input type="email" class="form-control"
                                                    placeholder="example@gmail.com">
                                            </div>
                                            <div class="col-md-6 custom-field">
                                                <label>Mật khẩu tạm thời</label>
                                                <div class="input-group">
                                                    <input type="text" class="form-control" id="tempPassword"
                                                        value="Aqua123@">
                                                    <button class="btn btn-outline-secondary" type="button"
                                                        onclick="generatePass()">
                                                        <i class="bi bi-arrow-clockwise"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            <div class="col-md-6 custom-field">
                                                <label>Số CCCD</label>
                                                <input type="text" class="form-control" placeholder="080...">
                                            </div>
                                            <div class="col-md-6 custom-field">
                                                <label>Số điện thoại</label>
                                                <input type="tel" class="form-control" placeholder="09...">
                                            </div>
                                            <div class="col-md-6 custom-field">
                                                <label>Ngày vào làm</label>
                                                <input type="date" class="form-control">
                                            </div>
                                            <div class="col-md-6 custom-field">
                                                <label>Khu vực trực</label>
                                                <input type="text" class="form-control"
                                                    placeholder="Ao số... - Khu vực...">
                                            </div>
                                            <div class="col-12 custom-field">
                                                <label>Địa chỉ</label>
                                                <input type="text" class="form-control"
                                                    placeholder="Số nhà, đường, phường...">
                                            </div>
                                            <div class="col-12 custom-field">
                                                <label>Ghi chú</label>
                                                <textarea class="form-control" rows="2"></textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="tab-pane fade" id="work-pane" role="tabpanel">
                                <div class="row g-3">
                                    <div class="col-12 custom-field">
                                        <label>Hình thức nhân sự</label>
                                        <select class="form-select" id="empType">
                                            <option value="official">Nhân viên chính thức (Lương + KPI)</option>
                                            <option value="collaborator">Cộng tác viên (Chỉ hưởng KPI/Hoa hồng)</option>
                                        </select>
                                    </div>
                                    <div id="baseSalaryGroup" class="col-12 custom-field">
                                        <label>Lương cứng thỏa thuận (VNĐ)</label>
                                        <input type="text" class="form-control" placeholder="Nhập 0 nếu là CTV">
                                    </div>

                                    <div class="col-12 custom-field mt-2">
                                        <label class="fw-bold text-primary text-uppercase small"><i
                                                class="bi bi-shield-lock me-2"></i>Phân quyền hệ thống</label>
                                        <div class="p-3 border rounded-3 bg-white shadow-sm">
                                            <div class="row g-3">
                                                <div class="col-md-6 custom-field">
                                                    <label>Nhóm quyền chính</label>
                                                    <select class="form-select">
                                                        <option value="staff">Nhân viên thị trường</option>
                                                        <option value="warehouse">Quản lý kho</option>
                                                        <option value="sale_manager">Trưởng phòng kinh doanh</option>
                                                        <option value="admin">Quản trị viên</option>
                                                    </select>
                                                </div>
                                                <div class="col-md-6 custom-field">
                                                    <label>Người quản lý trực tiếp</label>
                                                    <select class="form-select">
                                                        <option value="">-- Admin quản lý --</option>
                                                        <option value="1">Quản lý khu vực Miền Tây</option>
                                                        <option value="2">Quản lý khu vực Miền Đông</option>
                                                    </select>
                                                </div>
                                                <div class="col-12">
                                                    <label class="small fw-bold text-muted mb-2">Quyền hạn bổ
                                                        sung</label>
                                                    <div class="d-flex flex-wrap gap-3">
                                                        <div class="form-check">
                                                            <input class="form-check-input" type="checkbox" id="p1">
                                                            <label class="form-check-label small" for="p1">Xóa dữ
                                                                liệu</label>
                                                        </div>
                                                        <div class="form-check">
                                                            <input class="form-check-input" type="checkbox" id="p2">
                                                            <label class="form-check-label small" for="p2">Xem giá
                                                                vốn</label>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="tab-pane fade" id="kpi-pane" role="tabpanel">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <div class="p-3 border rounded-3 bg-white border-primary shadow-sm h-100"
                                            style="border-left: 5px solid #0d6efd !important;">
                                            <h6 class="fw-bold text-primary mb-3 text-uppercase small"><i
                                                    class="bi bi-water me-2"></i>Chỉ tiêu Giống</h6>
                                            <div class="custom-field mb-2">
                                                <label>Doanh số tối thiểu (M)</label>
                                                <input type="number" class="form-control" placeholder="100">
                                            </div>
                                            <div class="row g-2">
                                                <div class="col-6 custom-field">
                                                    <label>% Hoa hồng</label>
                                                    <input type="number" class="form-control" placeholder="5">
                                                </div>
                                                <div class="col-6 custom-field">
                                                    <label>Thưởng (VNĐ)</label>
                                                    <input type="text" class="form-control" placeholder="1.000.000">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="p-3 border rounded-3 bg-white border-success shadow-sm h-100"
                                            style="border-left: 5px solid #198754 !important;">
                                            <h6 class="fw-bold text-success mb-3 text-uppercase small"><i
                                                    class="bi bi-capsule me-2"></i>Chỉ tiêu Thuốc</h6>
                                            <div class="custom-field mb-2">
                                                <label>Doanh số tối thiểu (M)</label>
                                                <input type="number" class="form-control" placeholder="50">
                                            </div>
                                            <div class="row g-2">
                                                <div class="col-6 custom-field">
                                                    <label>% Hoa hồng</label>
                                                    <input type="number" class="form-control" placeholder="7">
                                                </div>
                                                <div class="col-6 custom-field">
                                                    <label>Thưởng (VNĐ)</label>
                                                    <input type="text" class="form-control" placeholder="500.000">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>

                        <div class="mt-4 pb-3 d-flex justify-content-end gap-2 px-2">
                            <button type="button" class="btn btn-light px-4 py-2 text-muted fw-bold"
                                onclick="history.back()">Hủy bỏ</button>
                            <button type="submit" class="btn btn-primary px-4 py-2 shadow fw-bold">
                                <i class="bi bi-check-circle me-2"></i>Lưu hồ sơ nhân viên
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>


    <!-- Dưới cùng file index.html -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/main.js"></script>
    <script src="assets/js/pages/add-employee.js"></script>
</body>

</html>
