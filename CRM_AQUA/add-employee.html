<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM AQUA - Dashboard</title>

    <!-- Bootstrap 5 CSS & Icon -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/test.css">
</head>

<body>

    <!-- Container để Autoload Sidebar -->
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <div class="container-fluid py-4">
            <div class="d-flex align-items-center mb-4">
                <h4 class="fw-bold mb-0">Thêm Hồ Sơ Nhân Viên</h4>
            </div>

            <div class="card border-0 shadow-sm custom-card">
                <div class="card-header bg-white border-bottom-0 pt-3 px-4">
                    <ul class="nav nav-tabs border-0 flex-nowrap aqua-tabs" id="empTab" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="info-tab" data-bs-toggle="tab"
                                data-bs-target="#info-pane" type="button">
                                <i class="bi bi-person-badge"></i>Thông tin
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="work-tab" data-bs-toggle="tab" data-bs-target="#work-pane"
                                type="button">
                                <i class="bi bi-calendar-event"></i>Công việc
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="kpi-tab" data-bs-toggle="tab" data-bs-target="#kpi-pane"
                                type="button">
                                <i class="bi bi-bar-chart"></i>KPI
                            </button>
                        </li>
                    </ul>
                </div>

                <div class="card-body p-4">
                    <form id="formAddEmployee">
                        <div class="tab-content" id="employeeTabContent">

                            <div class="tab-pane fade show active" id="info">
                                <div class="row g-3">
                                    <div class="col-md-4 text-center border-end">
                                        <div class="avatar-upload position-relative d-inline-block">
                                            <div class="avatar-preview mb-3" id="imagePreview"
                                                style="width: 160px; height: 160px; border: 2px dashed #dee2e6; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #f8fafc;">
                                                <i class="bi bi-camera fs-1 text-secondary" id="cameraIcon"></i>
                                                <img src="" id="imgOut"
                                                    style="width: 100%; height: 100%; object-fit: cover; display: none;">
                                            </div>

                                            <div class="input-group input-group-sm mb-3"
                                                style="width: 200px; margin: 0 auto;">
                                                <input type="file" class="form-control" id="employeeAvatar"
                                                    accept="image/*" onchange="previewFile()">
                                            </div>
                                        </div>

                                        <div class="custom-field text-start px-4 mt-3">
                                            <label class="small fw-bold text-muted text-uppercase">Trạng thái</label>
                                            <select class="form-select shadow-sm">
                                                <option value="active">Đang đi làm</option>
                                                <option value="leave">Nghỉ phép</option>
                                                <option value="off">Nghỉ việc</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="col-md-8">
                                        <div class="row px-3">
                                            <div class="col-md-6 custom-field">
                                                <label>Mã nhân viên</label>
                                                <input type="text" class="form-control" placeholder="VD: NV001">
                                            </div>
                                            <div class="col-md-6 custom-field">
                                                <label>Giới tính</label>
                                                <select class="form-select">
                                                    <option>Nam</option>
                                                    <option>Nữ</option>
                                                </select>
                                            </div>
                                            <div class="col-12 custom-field">
                                                <label>Số CCCD</label>
                                                <input type="text" class="form-control" placeholder="080...">
                                            </div>
                                            <div class="col-md-6 custom-field">
                                                <label>Số điện thoại</label>
                                                <input type="tel" class="form-control">
                                            </div>
                                            <div class="col-md-6 custom-field">
                                                <label>Ngày vào làm</label>
                                                <input type="date" class="form-control">
                                            </div>
                                            <div class="col-12 custom-field">
                                                <label>Khu vực trực</label>
                                                <input type="text" class="form-control"
                                                    placeholder="Ao số... - Khu vực...">
                                            </div>
                                            <div class="col-12 custom-field">
                                                <label>Địa chỉ</label>
                                                <input type="text" class="form-control">
                                            </div>
                                            <div class="col-12 custom-field">
                                                <label>Ghi chú</label>
                                                <textarea class="form-control" rows="2"></textarea>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="tab-pane fade" id="job">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Lương cứng nhận (VNĐ)</label>
                                        <input type="number" class="form-control form-control-lg" name="baseSalary"
                                            placeholder="6.460.000">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Chuyên cần (Ngày công)</label>
                                        <input type="number" class="form-control form-control-lg" name="workingDays"
                                            placeholder="26">
                                    </div>
                                </div>
                            </div>

                            <div class="tab-pane fade" id="kpi">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <div class="p-3 border rounded">
                                            <label class="form-label fw-bold text-primary">Doanh số giống (M)</label>
                                            <input type="number" class="form-control mb-2" name="targetSeed"
                                                placeholder="Chỉ tiêu (VD: 100)">
                                            <label class="small text-muted">Hoa hồng (%)</label>
                                            <input type="number" class="form-control" name="commSeed" placeholder="3">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="p-3 border rounded">
                                            <label class="form-label fw-bold text-success">Doanh số thuốc (M)</label>
                                            <input type="number" class="form-control mb-2" name="targetMed"
                                                placeholder="Chỉ tiêu (VD: 50)">
                                            <label class="small text-muted">Hoa hồng (%)</label>
                                            <input type="number" class="form-control" name="commMed" placeholder="5">
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>

                        <div class="mt-5 d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-secondary px-4 py-2"
                                onclick="history.back()">Đóng</button>
                            <button type="submit" class="btn btn-primary px-4 py-2 shadow">
                                <i class="bi bi-check-circle me-2"></i>Lưu hồ sơ
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>
    <!-- Dưới cùng file index.html -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/main.js"></script>
    <script src="assets/js/pages/add-employee.js"></script>
</body>

</html>
