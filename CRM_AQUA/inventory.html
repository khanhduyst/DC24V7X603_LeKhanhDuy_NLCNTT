<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Thuốc - CRM AQUA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="d-flex">
        <div id="sidebar-area"></div>
        <div class="main-content">
            <div id="header-area" class="p-4 pb-0"></div>
            <main class="p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">Kho Thuốc Thủy Sản</h2>
                    <button class="btn btn-primary px-4 shadow-sm" style="border-radius: 10px;">+ Nhập kho</button>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">Sản phẩm</th>
                                    <th>Số lô</th>
                                    <th>Hạn dùng</th>
                                    <th>Tồn kho</th>
                                    <th>Trạng thái</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="ps-4"><b>Yucca Zeolite</b></td>
                                    <td><code>L2405</code></td>
                                    <td>20/12/2026</td>
                                    <td>150 bao</td>
                                    <td><span class="badge bg-success-subtle text-success">Còn hàng</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="assets/js/main.js"></script>
</body>

</html>
