<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM AQUA - Quản lý kho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <div class="container-fluid py-3">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0 fs-5 text-aqua">Quản lý kho thuốc</h4>
                <button class="btn btn-aqua btn-sm" data-bs-toggle="modal" data-bs-target="#addMedModal">
                    <i class="bi bi-plus-lg"></i> <span class="d-none d-md-inline">Thêm mới</span>
                </button>
            </div>

            <div class="card border-0 shadow-sm p-3 mb-4">
                <div class="row g-2 align-items-center">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-muted">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" class="form-control border-start-0 ps-0" id="searchMedicine"
                                placeholder="Tìm tên thuốc, mã sản phẩm...">
                        </div>
                    </div>

                    <div class="col-md-3">
                        <select class="form-select" id="filterCategory">
                            <option value="">Tất cả loại</option>
                            <option value="Kháng sinh">Kháng sinh</option>
                            <option value="Vi sinh">Vi sinh</option>
                            <option value="Sát trùng">Sát trùng</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <select class="form-select" id="filterStatus">
                            <option value="">Tất cả trạng thái</option>
                            <option value="con-hang">Còn hàng</option>
                            <option value="sap-het">Sắp hết (<= 10)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Mã SP</th>
                                <th>Tên thuốc</th>
                                <th>Loại</th>
                                <th>Tồn kho</th>
                                <th>Đơn vị</th>
                                <th>Hạn sử dụng</th>
                                <th class="text-end">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="modal fade" id="addMedModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-xl modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title fw-bold">Tạo sản phẩm thuốc</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addMedForm">
                            <ul class="nav nav-tabs border-bottom-0 mb-3" id="productTab" role="tablist">
                                <li class="nav-item">
                                    <button class="nav-link active fw-bold py-2" id="info-tab-btn" type="button"
                                        data-bs-toggle="tab" data-bs-target="#info-tab-content">Thông tin</button>
                                </li>
                                <li class="nav-item">
                                    <button class="nav-link fw-bold py-2" id="desc-tab-btn" type="button"
                                        data-bs-toggle="tab" data-bs-target="#desc-tab-content">Mô tả sản phẩm</button>
                                </li>
                            </ul>

                            <div class="tab-content" id="productTabContent">
                                <div class="tab-pane fade show active" id="info-tab-content" role="tabpanel">
                                    <div class="row g-3">
                                        <div class="col-lg-9">
                                            <div class="row g-3">
                                                <div class="col-md-4">
                                                    <label class="form-label small fw-bold text-secondary">Mã sản
                                                        phẩm</label>
                                                    <input type="text" class="form-control bg-light"
                                                        placeholder="Mã tự động" readonly>
                                                </div>
                                                <div class="col-md-8">
                                                    <label class="form-label small fw-bold text-secondary">Tên sản
                                                        phẩm</label>
                                                    <input type="text" class="form-control"
                                                        placeholder="Nhập tên thuốc...">
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label small fw-bold text-secondary">Nhóm sản
                                                        phẩm</label>
                                                    <div class="input-group">
                                                        <select class="form-select">
                                                            <option>Xử lý môi trường</option>
                                                            <option>Kháng sinh</option>
                                                        </select>
                                                        <button class="btn btn-outline-aqua" type="button"><i
                                                                class="bi bi-plus-lg"></i></button>
                                                    </div>
                                                </div>
                                                <div class="col-md-6 mt-3">
                                                    <label class="form-label small fw-bold text-secondary">Ngày hết
                                                        hạn</label>
                                                    <input type="date" class="form-control" id="medExpiry">
                                                </div>
                                                <div class="col-md-6 mt-3">
                                                    <label class="form-label small fw-bold text-secondary">Số
                                                        lượng</label>
                                                    <input type="number" class="form-control" value="0">
                                                </div>
                                                <div class="col-md-6 mt-3">
                                                    <label class="form-label small fw-bold text-secondary">Trọng
                                                        lượng/Thể tích</label>
                                                    <div class="input-group">
                                                        <input type="text" class="form-control"
                                                            placeholder="Ví dụ: 500">
                                                        <select class="form-select" style="max-width: 100px;">
                                                            <option>Kg</option>
                                                            <option>Lít</option>
                                                            <option>Gam</option>
                                                        </select>
                                                    </div>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label small fw-bold text-secondary">Giá
                                                        vốn</label>
                                                    <input type="number" class="form-control" placeholder="0">
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label small fw-bold text-aqua">Giá bán</label>
                                                    <input type="number" class="form-control border-aqua"
                                                        placeholder="0">
                                                </div>
                                            </div>
                                        </div>

                                        <div class="col-lg-3">
                                            <label class="form-label small fw-bold text-secondary mb-2 d-block">Hình
                                                ảnh</label>
                                            <div class="d-flex gap-2">
                                                <div class="image-upload-main border rounded-3 d-flex flex-column align-items-center justify-content-center bg-light position-relative"
                                                    style="width: 120px; height: 120px; border: 2px dashed #ddd !important;">
                                                    <i class="bi bi-image fs-3 text-muted"></i>
                                                    <input type="file" class="position-absolute opacity-0 w-100 h-100"
                                                        style="cursor: pointer;">
                                                </div>
                                                <div class="d-flex flex-column gap-1">
                                                    <div class="image-upload-sub border rounded-2 d-flex align-items-center justify-content-center bg-light"
                                                        style="width: 28px; height: 28px; border: 1px dashed #ddd !important;">
                                                        +</div>
                                                    <div class="image-upload-sub border rounded-2 d-flex align-items-center justify-content-center bg-light"
                                                        style="width: 28px; height: 28px; border: 1px dashed #ddd !important;">
                                                        +</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="tab-pane fade" id="desc-tab-content" role="tabpanel">
                                    <div id="quill-editor" style="height: 250px;"></div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer border-top-0">
                        <button type="button" class="btn btn-light btn-sm px-3" data-bs-dismiss="modal">Bỏ qua</button>
                        <button type="button" class="btn btn-aqua btn-sm px-4">Lưu sản phẩm</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>
    <script type="module" src="assets/js/main.js"></script>
    <script src="assets/js/pages/inventory.js"></script>
</body>

</html>
